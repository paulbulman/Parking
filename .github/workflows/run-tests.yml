name: Run tests

on:
  push:
    branches-ignore: [main, develop]
  pull_request:
    branches-ignore: [main, develop]

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: '**/*.csproj'
      - name: Run tests
        run: dotnet test
